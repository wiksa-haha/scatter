<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFM Customer Segmentation</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #f5f5fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .chart-container {
    width: 100%;
    max-width: 1280px;
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 48px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.06);
    border: 1px solid #eaeaf2;
  }

  .chart-eyebrow  { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #a8a8c0; margin-bottom: 7px; }
  .chart-title    { font-size: 23px; font-weight: 700; color: #0f0f28; letter-spacing: -0.025em; line-height: 1.2; }
  .chart-subtitle { font-size: 12.5px; color: #8888a4; margin-top: 4px; }

  .chart-meta { display: flex; align-items: center; gap: 20px; margin-top: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .meta-stat  { display: flex; flex-direction: column; gap: 1px; }
  .meta-val   { font-size: 17px; font-weight: 700; color: #0f0f28; letter-spacing: -0.03em; }
  .meta-lbl   { font-size: 9.5px; color: #a8a8c0; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; }
  .meta-div   { width: 1px; height: 26px; background: #ebebf4; }

  .plot-wrapper { position: relative; user-select: none; }
  svg { width: 100%; display: block; overflow: visible; }

  .grid-line  { stroke: #efeff7; stroke-width: 1; }
  .axis-line  { stroke: #dcdcea; stroke-width: 1.5; }
  .axis-label { font-family: 'Outfit', sans-serif; font-size: 11px; fill: #8888a4; font-weight: 500; }
  .tick-label { font-family: 'Outfit', sans-serif; font-size: 10px; fill: #b4b4cc; }

  .bubble-group { cursor: pointer; }

  /* Circle only transitions opacity + filter — never transform/r */
  .bubble-circle { transition: opacity 0.2s ease, filter 0.2s ease; }

  .b-name  { font-family: 'Outfit', sans-serif; font-weight: 700; fill: #15152a; pointer-events: none; }
  .b-count { font-family: 'Outfit', sans-serif; font-weight: 400; fill: #38384e; pointer-events: none; }

  /* Tooltip — fade only, position is instant via transform */
  #tooltip {
    position: fixed;
    top: 0; left: 0;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 28px rgba(0,0,0,0.13);
    border: 1px solid rgba(0,0,0,0.07);
    pointer-events: none;
    z-index: 9999;
    min-width: 212px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.18s ease;
    transform: translate(-9999px, -9999px); /* hidden off-screen initially */
  }
  #tooltip.visible { opacity: 1; }

  .tt-inner   { padding: 13px 16px 14px 13px; border-left: 4px solid transparent; }
  .tt-head    { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .tt-dot     { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .tt-name    { font-size: 13px; font-weight: 700; color: #0f0f28; line-height: 1.2; }
  .tt-divider { height: 1px; background: #f0f0f8; margin-bottom: 9px; }
  .tt-row     { display: flex; justify-content: space-between; gap: 12px; font-size: 11.5px; color: #9090aa; margin-top: 5px; }
  .tt-row:first-of-type { margin-top: 0; }
  .tt-val     { font-weight: 600; color: #22223a; white-space: nowrap; }

  .legend      { display: flex; flex-wrap: wrap; gap: 6px 18px; margin-top: 22px; padding-top: 18px; border-top: 1px solid #f0f0f8; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: #70708a; cursor: default; }
  .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; opacity: 0.75; }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.08); }
    65%  { opacity: 1; transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }
  /* Only elements with this class get the animation */
  .do-pop-in { animation: popIn 0.52s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
</style>
</head>
<body>

<div class="chart-container">
  <div class="chart-eyebrow">RFM Model · Customer Analytics</div>
  <div class="chart-title">RFM Segmentation of Customers</div>
  <div class="chart-subtitle">Bubble size reflects customer count per segment</div>
  <div class="chart-meta">
    <div class="meta-stat"><span class="meta-val">5,942</span><span class="meta-lbl">Total Customers</span></div>
    <div class="meta-div"></div>
    <div class="meta-stat"><span class="meta-val">11</span><span class="meta-lbl">Segments</span></div>
    <div class="meta-div"></div>
    <div class="meta-stat"><span class="meta-val">19.1%</span><span class="meta-lbl">Champions</span></div>
  </div>
  <div class="plot-wrapper">
    <svg id="chart" viewBox="0 0 960 520"></svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div id="tooltip"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const SEGMENTS = [
  { name: "Champion",           count: 1130, recency: 10,  sales: 6800, hex: "#C8E032" },
  { name: "Loyal Customer",     count: 628,  recency: 60,  sales: 2100, hex: "#FF5E48" },
  { name: "Can't Lose Them",    count: 98,   recency: 240, sales: 1800, hex: "#2ECC71" },
  { name: "At Risk",            count: 536,  recency: 360, sales: 1400, hex: "#6BCF45" },
  { name: "Hibernating",        count: 1140, recency: 345, sales: 620,  hex: "#1BC8B8" },
  { name: "About to Sleep",     count: 191,  recency: 200, sales: 580,  hex: "#A855F7" },
  { name: "Lost",               count: 645,  recency: 565, sales: 380,  hex: "#3B9EFF" },
  { name: "Need Attention",     count: 323,  recency: 78,  sales: 1180, hex: "#6C78F5" },
  { name: "Promising",          count: 199,  recency: 55,  sales: 920,  hex: "#FF5FA8" },
  { name: "Potential Loyalist", count: 654,  recency: 68,  sales: 720,  hex: "#B0B8C8" },
  { name: "New Customer",       count: 398,  recency: 35,  sales: 460,  hex: "#FFB020" },
];

const TOTAL     = SEGMENTS.reduce((s,d) => s + d.count, 0);
const MAX_COUNT = Math.max(...SEGMENTS.map(d => d.count));

const W=960, H=520, M={top:28, right:24, bottom:58, left:80};
const PW = W-M.left-M.right, PH = H-M.top-M.bottom;

function sx(v) { return M.left + (1-(v/620))*PW; }
function sy(v) { return M.top + PH - ((v+200)/7600)*PH; }
function br(c) { return 24 + Math.sqrt(c/MAX_COUNT)*64; }

const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('chart');

function mk(tag, attrs, txt) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (txt !== undefined) e.textContent = txt;
  return e;
}

// ── Grid & axes ───────────────────────────────────────────────────────────
[0,100,200,300,400,500,600].forEach(t => {
  svg.appendChild(mk('line',{x1:sx(t),y1:M.top,x2:sx(t),y2:M.top+PH,class:'grid-line'}));
  svg.appendChild(mk('text',{x:sx(t),y:M.top+PH+17,'text-anchor':'middle',class:'tick-label'}, String(t)));
});
[0,1000,2000,3000,4000,5000,6000,7000].forEach(t => {
  svg.appendChild(mk('line',{x1:M.left,y1:sy(t),x2:M.left+PW,y2:sy(t),class:'grid-line'}));
  svg.appendChild(mk('text',{x:M.left-10,y:sy(t)+4,'text-anchor':'end',class:'tick-label'}, t.toLocaleString()));
});
svg.appendChild(mk('line',{x1:M.left,y1:M.top+PH,x2:M.left+PW,y2:M.top+PH,class:'axis-line'}));
svg.appendChild(mk('line',{x1:M.left,y1:M.top,x2:M.left,y2:M.top+PH,class:'axis-line'}));
svg.appendChild(mk('text',{x:M.left+PW/2,y:H-8,'text-anchor':'middle',class:'axis-label'},'Average days since the last purchase'));
svg.appendChild(mk('text',{transform:`translate(16,${M.top+PH/2}) rotate(-90)`,'text-anchor':'middle',class:'axis-label'},'Average sales per customer'));

// ── Two permanent layers (never recreated) ────────────────────────────────
const baseLayer = mk('g',{});
const topLayer  = mk('g',{});
svg.appendChild(baseLayer);
svg.appendChild(topLayer); // always renders on top of baseLayer

// ── Tooltip ───────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const TT_W = 220, TT_H = 152;
let activeGroup  = null; // the currently hovered <g>
let activeCircle = null;
let activeR      = 0;

const OPACITY_NORMAL  = 0.50;
const OPACITY_HOVERED = 0.85;

function positionTooltip(cx, cy) {
  const vw=window.innerWidth, vh=window.innerHeight, OFF=22;
  let tx = cx+OFF,    ty = cy - TT_H/2;
  if (tx+TT_W > vw-10) tx = cx - TT_W - OFF;
  if (ty < 8)           ty = 8;
  if (ty+TT_H > vh-8)   ty = vh - TT_H - 8;
  // Instant position — no transition on transform
  tooltip.style.transform = `translate(${Math.round(tx)}px,${Math.round(ty)}px)`;
}

function openTooltip(d, cx, cy) {
  const pct = (d.count/TOTAL*100).toFixed(1);
  tooltip.innerHTML = `
    <div class="tt-inner" style="border-left-color:${d.hex}">
      <div class="tt-head">
        <span class="tt-dot" style="background:${d.hex}"></span>
        <span class="tt-name">${d.name}</span>
      </div>
      <div class="tt-divider"></div>
      <div class="tt-row"><span>Customers</span><span class="tt-val">${d.count.toLocaleString()}</span></div>
      <div class="tt-row"><span>Share</span><span class="tt-val">${pct}%</span></div>
      <div class="tt-row"><span>Avg. Recency</span><span class="tt-val">${d.recency} days</span></div>
      <div class="tt-row"><span>Avg. Sales</span><span class="tt-val">$${d.sales.toLocaleString()}</span></div>
    </div>`;
  positionTooltip(cx, cy);
  tooltip.classList.add('visible');
}

function closeTooltip() {
  tooltip.classList.remove('visible');
}

// ── Deactivate whatever is currently hovered ──────────────────────────────
function deactivate() {
  if (!activeGroup) return;
  // Return bubble to base layer
  baseLayer.appendChild(activeGroup);
  // Restore original radius + opacity
  activeCircle.setAttribute('r', String(activeR));
  activeCircle.setAttribute('opacity', String(OPACITY_NORMAL));
  activeCircle.style.filter = '';
  activeGroup  = null;
  activeCircle = null;
  activeR      = 0;
  closeTooltip();
}

// ── Activate a bubble ─────────────────────────────────────────────────────
function activate(g, circle, r, d, cx, cy) {
  if (activeGroup === g) return; // already active — just move tooltip
  deactivate();                  // deactivate previous

  activeGroup  = g;
  activeCircle = circle;
  activeR      = r;

  // Remove animation class BEFORE reparenting — prevents re-trigger
  g.classList.remove('do-pop-in');
  topLayer.appendChild(g);

  circle.setAttribute('r', String(r * 1.10));
  circle.setAttribute('opacity', String(OPACITY_HOVERED));
  circle.style.filter = 'drop-shadow(0 3px 14px rgba(0,0,0,0.22))';

  openTooltip(d, cx, cy);
}

// ── Global mousemove: detect which bubble (if any) cursor is over ─────────
// Using SVG hit-testing via getIntersectionList / manual distance check
// We compute distance from cursor to each bubble center in SVG coords.

const bubbleData = []; // filled below during draw

document.addEventListener('mousemove', e => {
  const svgRect = svg.getBoundingClientRect();
  // Convert client coords to SVG viewBox coords
  const scaleX = W / svgRect.width;
  const scaleY = H / svgRect.height;
  const mx = (e.clientX - svgRect.left) * scaleX;
  const my = (e.clientY - svgRect.top)  * scaleY;

  // Find closest bubble whose distance < its radius
  let hit = null;
  let minDist = Infinity;
  for (const bd of bubbleData) {
    const dx = mx - bd.cx, dy = my - bd.cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= bd.r && dist < minDist) {
      minDist = dist;
      hit = bd;
    }
  }

  if (hit) {
    activate(hit.g, hit.circle, hit.r, hit.d, e.clientX, e.clientY);
    positionTooltip(e.clientX, e.clientY);
  } else {
    deactivate();
  }
});

// ── Draw bubbles ──────────────────────────────────────────────────────────
[...SEGMENTS]
  .sort((a,b) => b.count - a.count)   // large behind small in base layer
  .forEach(d => {
    const cx  = sx(d.recency);
    const cy  = sy(d.sales);
    const r   = br(d.count);
    const pct = (d.count/TOTAL*100).toFixed(1);
    const ai  = SEGMENTS.indexOf(d);  // original index for animation stagger
    const fs  = Math.max(9,  Math.min(12,   9 + (d.count/MAX_COUNT)*3));
    const fsC = Math.max(7.5,Math.min(10, 7.5 + (d.count/MAX_COUNT)*2));

    const g = mk('g', { class: 'bubble-group do-pop-in' });
    g.style.animationDelay = `${ai * 0.06}s`;
    // Set transform-origin to the bubble center for correct scale animation
    g.style.transformOrigin = `${cx}px ${cy}px`;
    g.style.transformBox    = 'fill-box';

    const circle = mk('circle', {
      cx, cy, r,
      fill:    d.hex,
      opacity: String(OPACITY_NORMAL),
      class:   'bubble-circle'
    });
    g.appendChild(circle);
    g.appendChild(mk('text', {x:cx, y:cy-(r>44?7:5), 'text-anchor':'middle', class:'b-name', 'font-size':fs}, d.name));
    g.appendChild(mk('text', {x:cx, y:cy+(r>44?12:9),'text-anchor':'middle', class:'b-count','font-size':fsC, opacity:'0.65'}, `${d.count.toLocaleString()} · ${pct}%`));

    // Register for hit-testing
    bubbleData.push({ g, circle, r, cx, cy, d });

    baseLayer.appendChild(g);
  });

// Remove animation class after all animations complete so reparenting is safe
setTimeout(() => {
  document.querySelectorAll('.do-pop-in').forEach(el => el.classList.remove('do-pop-in'));
}, 1200);

// ── Legend ────────────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
SEGMENTS.forEach(d => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${d.hex}"></span>${d.name}`;
  legendEl.appendChild(item);
});
</script>
</body>
</html>
